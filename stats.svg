<rect x="1" y="1" width="478" height="228" rx="16" fill="url(#bgGlow)"/>
<text x="24" y="34" font-size="15" fill="#f5eaff" font-weight="700" class="sans">Rohit&#8217;s Testing Journey</text>
<g transform="translate(96,138)">
