name: Generate Snake Animation

on:
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game from contribution grid
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: Rohitc6261
          outputs: |
            dist/github-snake.svg?color_snake=#ff4fd8&color_dots=#1a0b2e,#3d1f5c,#7b2ff7,#c77dff,#ff8ae2&color_dot_border=#0d0616
            dist/github-snake-dark.svg?color_snake=#ff4fd8&color_dots=#150a24,#3d1f5c,#7b2ff7,#c77dff,#ff8ae2&color_dot_border=#0d0616&palette=github-dark
            dist/github-snake.gif?color_snake=#ff4fd8&color_dots=#1a0b2e,#3d1f5c,#7b2ff7,#c77dff,#ff8ae2&color_dot_border=#0d0616

      - name: Push snake output to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
