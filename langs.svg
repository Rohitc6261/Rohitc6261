<svg width="480" height="230" viewBox="0 0 480 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohit Chaurasia top languages and tools">

    <defs>
      <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff4fd8"/>
        <stop offset="100%" stop-color="#9d4edd"/>
      </linearGradient>
      <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
        <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="shineGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="48%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="0.3"/>
        <stop offset="52%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      
    </defs>

<style>
  text { font-family: ui-monospace, SFMono-Regular, Consolas, 'Courier New', monospace; }
  .sans { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
  .slideIn { opacity: 0; animation: slideIn 0.6s ease forwards; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: translateX(0); } }
  .popCell { opacity: 0; animation: popCell 0.5s cubic-bezier(.2,1.5,.4,1) forwards; transform-box: fill-box; transform-origin: 50% 50%; }
  @keyframes popCell { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
</style>

<rect x="1" y="1" width="478" height="228" rx="16" fill="#12081f" stroke="rgba(199,125,255,0.28)" stroke-width="1.2"/>
<rect x="1" y="1" width="478" height="228" rx="16" fill="url(#bgGlow)"/>
<text x="24" y="34" font-size="15" fill="#f5eaff" font-weight="700" class="sans">Top Languages &amp; Tools</text>
<rect x="24" y="56" width="432" height="16" rx="8" fill="rgba(255,255,255,0.045)"/>
