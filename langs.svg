<rect x="412.8" y="56" width="0" height="16" fill="#c77dff"><animate attributeName="width" values="0;43.2" dur="0.9s" begin="0.78s" fill="freeze"/></rect>
<clipPath id="barClip"><rect x="24" y="56" width="432" height="16" rx="8"/></clipPath>

